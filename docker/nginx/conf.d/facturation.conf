# ============================================
# KTC Invoice - Nginx interne (HTTP only)
# Le SSL est géré par le proxy global nginx_proxy
# ============================================

server {
    listen 80;
    server_name facturation.kamer-center.net localhost;

    root /var/www/html/public;
    index index.php;

    client_max_body_size 100M;

    # Trusted proxy headers (venant du proxy global)
    set_real_ip_from 172.16.0.0/12;
    real_ip_header X-Forwarded-For;

    location / {
        try_files $uri /index.php$is_args$args;
    }

    location ~ ^/index\.php(/|$) {
        fastcgi_pass ktc-invoice-app:9000;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        fastcgi_param HTTPS on;
        internal;
    }

    location ~ \.php$ {
        return 404;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}