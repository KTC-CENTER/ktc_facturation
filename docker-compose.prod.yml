name: Deploy KTC-Invoice to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  DOMAIN: facturation.kamer-center.net
  VPS_IP: 81.169.177.240
  APP_DIR: /opt/apps/ktc-invoice
  CONTAINER_NAME: ktc-invoice-app

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo_mysql, mbstring, gd, zip, intl, opcache
          coverage: none

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress --no-scripts

      - name: Check Symfony requirements
        run: php bin/console about || true

  deploy:
    name: Deploy to VPS
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH Key
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ env.VPS_IP }} >> ~/.ssh/known_hosts

      - name: Create deployment directories
        run: |
          ssh root@${{ env.VPS_IP }} "mkdir -p ${{ env.APP_DIR }} ${{ env.APP_DIR }}/var/cache ${{ env.APP_DIR }}/var/log ${{ env.APP_DIR }}/public/uploads/logo ${{ env.APP_DIR }}/public/uploads/pdf"

      - name: Sync application files
        run: |
          rsync -avz --delete \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude 'var/cache/*' \
            --exclude 'var/log/*' \
            --exclude '.env.local' \
            --exclude '.env' \
            --exclude '.env.prod' \
            --exclude 'public/uploads/*' \
            ./ root@${{ env.VPS_IP }}:${{ env.APP_DIR }}/

      - name: Deploy .env to server
        run: |
          cat > /tmp/.env << ENVEOF
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          DB_ROOT_PASSWORD=${{ secrets.DB_ROOT_PASSWORD }}
          APP_SECRET=${{ secrets.APP_SECRET }}
          APP_LOCALE=${{ secrets.APP_LOCALE }}
          APP_TIMEZONE=${{ secrets.APP_TIMEZONE }}
          APP_NAME="${{ secrets.APP_NAME }}"
          DEFAULT_CURRENCY=${{ secrets.DEFAULT_CURRENCY }}
          DEFAULT_TAX_RATE=${{ secrets.DEFAULT_TAX_RATE }}
          MAILER_DSN=${{ secrets.MAILER_DSN }}
          BREVO_API_KEY=${{ secrets.BREVO_API_KEY }}
          BREVO_SENDER_EMAIL=${{ secrets.BREVO_SENDER_EMAIL }}
          BREVO_SENDER_NAME="${{ secrets.BREVO_SENDER_NAME }}"
          ENVEOF
          sed -i 's/^[[:space:]]*//' /tmp/.env
          scp /tmp/.env root@${{ env.VPS_IP }}:${{ env.APP_DIR }}/.env
          rm -f /tmp/.env

      - name: Deploy with Docker
        run: |
          ssh root@${{ env.VPS_IP }} 'cd ${{ env.APP_DIR }} && \
            docker network create proxy-network 2>/dev/null || true && \

            # ── Démarrer la DB si elle ne tourne pas encore ──
            if ! docker ps --filter "name=ktc-invoice-mysql" -q | grep -q .; then
              echo ">>> DB not running, starting..."
              docker compose -f docker-compose.prod.yml up -d ktc-invoice-db
              echo "Waiting for DB..."
              sleep 20
            fi && \

            # ── Rebuild uniquement app + nginx (jamais la DB) ──
            echo ">>> Building app container..."
            docker compose -f docker-compose.prod.yml build --no-cache ktc-invoice-app && \
            echo ">>> Restarting app + nginx..."
            docker compose -f docker-compose.prod.yml up -d --no-deps ktc-invoice-app ktc-invoice-nginx ktc-invoice-pma && \

            echo "Waiting for app..." && \
            sleep 15 && \

            if docker ps | grep -q ktc-invoice-app; then
              echo "Container running, configuring..."
              echo ">>> Schema update (force)..."
              docker exec ktc-invoice-app php bin/console doctrine:schema:update --force --complete
              echo ">>> Cache clear..."
              docker exec ktc-invoice-app php bin/console cache:clear --env=prod
              docker exec ktc-invoice-app php bin/console cache:warmup --env=prod
              echo ">>> Permissions..."
              docker exec ktc-invoice-app chown -R www-data:www-data var public/uploads public/build
              docker exec ktc-invoice-app chmod -R 775 var public/uploads
              echo "✅ Deployment completed!"
            else
              docker logs ktc-invoice-app --tail 50
              exit 1
            fi && \
            docker exec nginx_proxy nginx -s reload 2>/dev/null || true'

      - name: Health Check
        run: |
          sleep 5
          response=$(curl -s -o /dev/null -w "%{http_code}" https://${{ env.DOMAIN }} --insecure || echo "000")
          echo "HTTP Response: $response"
          if [ "$response" = "200" ] || [ "$response" = "302" ]; then
            echo "✅ Application is responding"
          else
            echo "⚠️ Application returned HTTP $response"
          fi